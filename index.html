<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"

    <header>
      <button type="button" onclick="openAboutMe()">

    <main>
      <section class="hero">
        <h1>Hi, Welcome to my website</h1>

      <search>

          <div class="search_input">
            <img src="/icons/Search icon.svg" alt="search icon" />

          </div>
          <button type="button" id="filter_button" onclick="openFilterList()">
            <img src="/icons/Filter list icon.svg" alt="filter icon" />
            All
            <img
              src="/icons/Arrow drop down icon.svg"
              alt="arrow drop down icon"
            />
          </button>
        </div>
        <ul data-projects class="project_list">
          <li data-project id="Hydrocivik">

              <div class="front">

                </div>
              </div>
              <div class="back">
                <div>
                  <section>
                    <h5>Hydrocivik</h5>
                    <p class="small">

                    </p>
                  </section>
                  <div>
                    <ul class="tags">
                      <li class="tag">Website</li>
                      <li class="tag">UX/UI</li>
                      <!-- <li class="tag">Music</li>
                    <li class="tag">Portfolio</li> -->
                      <li>
                        <button class="tag_button" type="button">+2</button>
                      </li>
                    </ul>
                    <a href="https://hyrax-x.github.io/hydrocivik">
                      <img
                        src="icons/arrow forward icon.svg"
                        alt="arrow icon"
                      />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </li>
        </ul>
      </search>
    </main>
    <div class="footer_placeholder"></div>
    <footer>

          <h4>Navigation</h4>

              </li>
            </ul>

        </section>
        <div class="divider"></div>
        <section class="time_loc">

            <time datetime="">
              <p class="time">11:30</p>

        <div class="divider"></div>
        <section>

          <p class="small">tong.quocviet1234@gmail.com</p>
          <ul>
            <li>
              <a href="https://www.youtube.com/@Hydrocivik" target="_blank"
                ><img src="/icons/youtube icon.svg" alt="Youtube icon" />
              </a>
            </li>
            <li>
              <a href="https://www.instagram.com/hyrax.zip" target="_blank">
                <img src="/icons/instagram icon.svg" alt="Instagram icon" />
              </a>
            </li>
            <li>
              <a
                href="https://www.facebook.com/viet.tongquoc.9843/"

            <li>
              <a
                href="https://bsky.app/profile/hyrax-x.bsky.social"

            <li>
              <a href="https://github.com/hyrax-x" target="_blank"
                ><img src="/icons/github icon.svg" alt="Github icon"
              /></a>
