<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <title>Home page - Hyrax-x</title>
    <meta name="description" content="Here is all my projects and works" />

  <body>
    <header>
      <nav>
        <!-- TODO Create Navigation to about me page and other pages-->
        <button type="button" onclick="openAboutMe()" class="title s">
          Hyrax-x
        </button>
      </nav>
      <!-- TODO make this instruction follow Mavis Daemon button-->
      <!-- <div id="instruction">
          <img src="icons/Arrow 1.svg" alt="arrow up" />
          <p class="cap">About me</p>
        </div> -->
    </header>

    <main>
      <section class="hero">
        <h1>Hi, Welcome to my website</h1>
      </section>

      <search>
        <div class="search_bar">
          <div class="search_input">
            <img src="/icons/Search icon.svg" alt="search icon" />
            <input type="search" placeholder="Search..." />
          </div>
          <button
            type="button"
            id="filter_button"
            class="button"
            onclick="openFilterList()"
          >
            <img src="/icons/Filter list icon.svg" alt="filter icon" />
            All
            <img
              src="/icons/Arrow drop down icon.svg"
              alt="arrow drop down icon"
            />
          </button>
        </div>
        <ul data-projects class="project_list">
          <li data-project id="Hydrocivik" data-select="false">
            <div class="card">
              <div class="front">
                <img
                  src="https://res.cloudinary.com/dpzwk2l36/image/upload/v1773071903/hydrocivik_site_placeholder_whym0o.webp"
                  alt="hydrocivik's site thumbnail"
                  class="card_image"
                />
                <div class="pin">
                  <img src="icons/pin icon.svg" alt="pin icon" />
                </div>
              </div>
              <div class="back">
                <div>
                  <section>
                    <h2 class="title s">Hydrocivik</h2>
                    <p class="body s">
                      This is a website to showcase my music.
                    </p>
                  </section>
                  <div>
                    <ul class="tags">
                      <li class="tag">Website</li>
                      <li class="tag">UX/UI</li>
                      <!-- <li class="tag">Music</li>
                    <li class="tag">Portfolio</li> -->
                      <li>
                        <button class="tag" type="button">+2</button>
                      </li>
                    </ul>
                    <a
                      href="https://hyrax-x.github.io/hydrocivik/"
                      target="_blank"
                      aria-label="Link to Hydrocivik web page"
                    >
                      <img
                        src="icons/arrow forward icon.svg"
                        alt="arrow icon"
                      />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </li>
        </ul>
      </search>
    </main>
    <div class="footer_placeholder"></div>
    <footer>
      <div class="upper_footer">
        <section>
          <h2 class="title s">Navigation</h2>
          <ul>
            <li>
              <a
                href="#"
                aria-label="Scroll back to top of the page"
                class="body s"
              >
                Back to top
              </a>
            </li>
            <li>
              <!-- TODO Link to the about me page-->
              <p class="body s">About me</p>
            </li>
          </ul>
        </section>
        <div class="divider"></div>
        <section class="time_loc">
          <h2 class="title s">Time & Location</h2>
          <div>
            <time datetime="" class="body s">
              <span class="time">11:30</span>
              <span class="utc">(UTC +1)</span>
            </time>
            <p class="body s">Warsaw, Poland</p>
          </div>
        </section>
        <div class="divider"></div>
        <section>
          <h2 class="title s">Contact me</h2>
          <p class="body s">tong.quocviet1234@gmail.com</p>
          <ul>
            <li>
              <a
                href="https://www.youtube.com/@Hydrocivik"
                target="_blank"
                aria-label="Link to my youtube channel"
              >
                <img src="/icons/youtube icon.svg" alt="Youtube icon" />
              </a>
            </li>
            <li>
              <a
                href="https://www.instagram.com/hyrax.zip"
                target="_blank"
                aria-label="Link to my instagram"
              >
                <img src="/icons/instagram icon.svg" alt="Instagram icon" />
              </a>
            </li>
            <li>
              <a
                href="https://www.facebook.com/viet.tongquoc.9843/"
                target="_blank"
                aria-label="Link to my facebook account"
              >

              </a>
            </li>
            <li>
              <a
                href="https://bsky.app/profile/hyrax-x.bsky.social"
                target="_blank"
                aria-label="Link to my Bluesky account"
              >
                <img src="/icons/bluesky icon.svg" alt="Bluesky icon" />
              </a>
            </li>
            <li>
              <a
                href="https://github.com/hyrax-x"
                target="_blank"
                aria-label="Link to my Github account"
              >
                <img src="/icons/github icon.svg" alt="Github icon"
              /></a>
            </li>
          </ul>
        </section>
      </div>
      <div class="lower_footer">
        <p class="title">Hyrax-x</p>
        <p class="cap s">License</p>
      </div>
    </footer>
    <script src="script.js"></script>
